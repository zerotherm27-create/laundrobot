    <style>
      :root {
        --primary:        #38a9c2;
        --primary-dark:   #1d8ba0;
        --primary-light:  #e6f5f8;
        --accent:         #fdca00;
        --accent-dark:    #d4a800;
        --success:        #1D9E75;
        --success-bg:     #EAF3DE;
        --warning:        #BA7517;
        --warning-bg:     #FDF3E3;
        --danger:         #A32D2D;
        --danger-bg:      #FCEBEB;
        --purple:         #7F77DD;
        --purple-bg:      #F0EFFC;

        --bg:             #F7F7F5;
        --card:           #FFFFFF;
        --border:         #E8E8E0;
        --border-subtle:  #F0F0EC;

        --text:           #0D1117;
        --text-2:         #374151;
        --text-3:         #374151;

        --radius-sm:      6px;
        --radius:         10px;
        --radius-lg:      14px;
        --radius-xl:      20px;

        --shadow-xs:  0 1px 2px rgba(0,0,0,.05);
        --shadow-sm:  0 1px 4px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
        --shadow:     0 4px 14px rgba(0,0,0,.08);
        --shadow-lg:  0 12px 40px rgba(0,0,0,.12);
        --shadow-xl:  0 24px 64px rgba(0,0,0,.16);

        --sidebar-w: 230px;
        --transition: 0.15s ease;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.6;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      input, select, textarea, button { font-family: inherit; }

      /* ── Focus states ── */
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 3px rgba(56,169,194,.15) !important;
      }
      button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D4D4D0; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #AAAAA0; }

      /* ── Transitions ── */
      button, a { transition: all var(--transition); }

      /* ── Sidebar nav items ── */
      .nav-item {
        display: flex; align-items: center; gap: 10px;
        width: 100%; padding: 9px 1.25rem; font-size: 13px;
        background: transparent; border: none; cursor: pointer;
        text-align: left; font-weight: 400; color: var(--text-2);
        border-left: 3px solid transparent;
        transition: background var(--transition), color var(--transition);
        font-family: inherit;
      }
      .nav-item:hover { background: #F5F5F3; color: var(--text); }
      .nav-item.active {
        background: var(--primary-light); color: #1a7d94;
        border-left-color: var(--accent); font-weight: 500;
      }
      .nav-item-super { color: var(--text-2); }
      .nav-item-super:hover { background: var(--warning-bg); color: var(--warning); }
      .nav-item-super.active { background: var(--warning-bg); color: var(--warning); border-left-color: var(--warning); font-weight: 500; }

      /* ── Animations ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .animate-fade-up  { animation: fadeUp  0.25s ease both; }
      .animate-fade-in  { animation: fadeIn  0.2s  ease both; }

      .skeleton {
        background: linear-gradient(90deg, #f0f0ec 25%, #e8e8e4 50%, #f0f0ec 75%);
        background-size: 400px 100%;
        animation: shimmer 1.4s ease infinite;
        border-radius: 4px;
      }

      /* ── Spinner ── */
      .spinner {
        width: 18px; height: 18px; border-radius: 50%;
        border: 2px solid rgba(255,255,255,.3);
        border-top-color: #fff;
        animation: spin 0.7s linear infinite;
        display: inline-block;
      }
      .spinner-blue {
        border-color: rgba(56,169,194,.2);
        border-top-color: var(--primary);
      }

      /* ── Stat card hover ── */
      .stat-card {
        background: var(--card);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
        transition: box-shadow var(--transition), transform var(--transition);
        cursor: default;
      }
      .stat-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

      /* ── Table row hover ── */
      .tr-hover:hover { background: #FAFAF8 !important; }

      /* ── Primary button ── */
      .btn-primary {
        padding: 8px 16px; font-size: 13px; font-weight: 500;
        border-radius: var(--radius); border: none; cursor: pointer;
        background: var(--primary); color: #fff;
        display: inline-flex; align-items: center; gap: 6px;
      }
      .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(56,169,194,.3); }
      .btn-primary:active { transform: scale(.98); }
      .btn-primary:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

      /* ── Ghost button ── */
      .btn-ghost {
        padding: 7px 14px; font-size: 13px; font-weight: 500;
        border-radius: var(--radius); border: 0.5px solid var(--border);
        cursor: pointer; background: transparent; color: var(--text-2);
        display: inline-flex; align-items: center; gap: 6px;
      }
      .btn-ghost:hover { background: var(--bg); border-color: #ccc; color: var(--text); }

      /* ── Input base ── */
      .input-base {
        width: 100%; box-sizing: border-box;
        padding: 8px 12px; font-size: 13px;
        border-radius: var(--radius-sm); border: 0.5px solid #D1D5DB;
        background: #fff; color: var(--text);
        transition: border-color var(--transition), box-shadow var(--transition);
      }
      .input-base::placeholder { color: var(--text-3); }

      /* ── Modal overlay ── */
      .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.45);
        backdrop-filter: blur(2px);
        display: flex; align-items: center; justify-content: center;
        z-index: 200;
        animation: fadeIn 0.15s ease;
      }
      .modal-card {
        background: var(--card); border-radius: var(--radius-xl);
        border: 0.5px solid var(--border);
        box-shadow: var(--shadow-xl);
        animation: fadeUp 0.2s ease;
      }

      #root { min-height: 100vh; }

      /* ════════════════════════════════════════════
         RESPONSIVE — tablet & mobile
         Desktop (≥1024px): unchanged.
         Tablet (768–1023px): narrower padding, 2-col grids.
         Mobile (<768px): sidebar drawer, stacked layout.
      ════════════════════════════════════════════ */

      /* ── Safe area (PWA / notched iPhones) ── */
      .mobile-topbar {
        padding-top: env(safe-area-inset-top);
        height: calc(52px + env(safe-area-inset-top));
      }
      .dashboard-main-bottom-pad {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .sidebar-drawer {
        padding-top: env(safe-area-inset-top);
      }

      /* ── Hamburger button (hidden on desktop) ── */
      .hamburger-btn {
        display: none;
        background: none; border: none; cursor: pointer;
        padding: 6px; border-radius: var(--radius-sm);
        color: var(--text); font-size: 22px; line-height: 1;
        flex-shrink: 0;
      }

      /* ── Mobile top bar (hidden on desktop) ── */
      .mobile-topbar {
        display: none;
        position: sticky; top: 0; z-index: 100;
        background: var(--card);
        border-bottom: 0.5px solid var(--border);
        align-items: center; gap: 10px;
        padding: 0 1rem; height: 52px;
        flex-shrink: 0;
      }
      .mobile-topbar-title {
        flex: 1; font-size: 15px; font-weight: 700; color: var(--text);
      }

      /* ── Sidebar overlay (mobile backdrop) ── */
      .sidebar-mobile-overlay {
        display: none;
        position: fixed; inset: 0; z-index: 149;
        background: rgba(0,0,0,.45);
        animation: fadeIn 0.2s ease;
      }
      .sidebar-mobile-overlay.open { display: block; }

      /* ── Grid helpers (just carry the class; inline styles set desktop values) ── */
      /* Override via !important inside media queries below */

      /* ── Kanban wrapper: lets board scroll horizontally on small screens ── */
      .kanban-wrapper { width: 100%; }

      /* ── Table scroll wrapper ── */
      .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* ════ TABLET  768 – 1023 px ════ */
      @media (min-width: 768px) and (max-width: 1023px) {
        .dashboard-main { padding: 1.25rem 1.5rem !important; }

        /* 4-col stat grid → 2 cols */
        .stat-grid-4  { grid-template-columns: repeat(2,1fr) !important; }
        /* 2-col chart/report grid → 1 col */
        .chart-grid-2 { grid-template-columns: 1fr !important; }
        /* Kanban 5 cols → 3 cols (still fits most tablets) */
        .kanban-board { grid-template-columns: repeat(3,minmax(200px,1fr)) !important; }
        .kanban-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
      }

      /* ════ MOBILE  < 768 px ════ */
      @media (max-width: 767px) {
        /* Show hamburger & topbar */
        .hamburger-btn { display: flex; align-items: center; justify-content: center; }
        .mobile-topbar  { display: flex; }

        /* Layout: vertical stack */
        .dashboard-layout { flex-direction: column !important; }

        /* Sidebar: fixed off-screen drawer */
        .sidebar-drawer {
          position: fixed !important;
          left: -250px; top: 0; bottom: 0;
          width: 230px !important;
          z-index: 150;
          transition: left 0.25s ease;
          box-shadow: var(--shadow-lg);
          overflow-y: auto;
          height: 100% !important;
        }
        .sidebar-drawer.open { left: 0 !important; }

        /* Main: full-width, less padding */
        .dashboard-main {
          max-width: 100vw !important;
          padding: 1rem !important;
          overflow-y: visible !important;
        }

        /* Stat grid: 2 cols on mobile */
        .stat-grid-4  { grid-template-columns: 1fr 1fr !important; }
        /* Charts / reports stack */
        .chart-grid-2 { grid-template-columns: 1fr !important; }

        /* Kanban: columns scroll horizontally */
        .kanban-wrapper {
          overflow-x: auto; -webkit-overflow-scrolling: touch;
          margin: 0 -1rem; padding: 0 1rem 12px;
        }
        .kanban-board {
          grid-template-columns: repeat(5, minmax(230px,1fr)) !important;
          min-width: max-content;
        }
        /* Kanban status filter bar: wrap to 3+2 */
        .kanban-filters {
          grid-template-columns: repeat(3,1fr) !important;
          flex-wrap: wrap;
        }

        /* Modal: nearly full-screen */
        .modal-card {
          width: calc(100vw - 1.5rem) !important;
          max-width: 100% !important;
          max-height: 90vh;
          overflow-y: auto;
          border-radius: var(--radius-lg) !important;
        }

        /* Page header flex rows: wrap on mobile */
        .page-header-row { flex-wrap: wrap; gap: 10px !important; }
        .filter-row { flex-wrap: wrap !important; gap: 8px !important; }
        .filter-row > * { flex: 1 1 140px; min-width: 120px; }

        /* Orders: detail panel stacks below table on mobile */
        .orders-grid { grid-template-columns: 1fr !important; }

        /* CreateOrderModal: 2-col grids stack to 1 col */
        .modal-2col { grid-template-columns: 1fr !important; }

        /* Delivery settings: shop location 2-col grid stacks */
        .delivery-loc-grid { grid-template-columns: 1fr !important; }
      }

      /* ── Modal close button (mobile only) ── */
      @media (max-width: 767px) {
        .modal-close-mobile { display: block !important; }

        /* Push modal below the sticky topbar so × is never hidden */
        .modal-overlay {
          align-items: flex-start !important;
          padding-top: calc(52px + env(safe-area-inset-top) + 8px) !important;
          padding-bottom: 16px !important;
        }
      }

      /* ── Urgency card animations ── */
      @keyframes urgency-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.35); }
        50%       { box-shadow: 0 0 0 6px rgba(220,38,38,0); }
      }
      .card-overdue {
        animation: urgency-pulse 2s ease-in-out infinite;
      }
    </style>
